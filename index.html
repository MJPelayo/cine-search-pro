<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cine Search Pro</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="app" data-loading="false">

<h1>Cine Search Pro</h1>

<input id="searchBox" placeholder="Search movies..." />

<ul id="results"></ul>

<template id="movie-template">
  <li class="movie-item">
    <span class="title"></span>
  </li>
</template>

<p id="message"></p>

<div class="spinner">Loading...</div>

<!-- PHASE 3: DETAIL PANEL -->
<div class="detail-panel" id="detailPanel" style="display: none;">
  <div class="detail-header">
    <h2 id="detailTitle">Movie Title</h2>
    <button id="closeDetailBtn" class="close-btn">×</button>
  </div>
  
  <div class="detail-content">
    <div class="detail-section">
      <h3>Overview</h3>
      <p id="detailOverview"></p>
    </div>
    
    <div class="detail-section">
      <h3>Genres</h3>
      <div id="detailGenres"></div>
    </div>
    
    <div class="detail-section">
      <h3>Cast</h3>
      <ul id="detailCast"></ul>
    </div>
    
    <div class="detail-section">
      <h3>Trailer</h3>
      <div id="detailTrailer"></div>
    </div>
  </div>
</div>

</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
